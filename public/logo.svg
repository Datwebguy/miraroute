<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!--
    MiraRoute Logo — Icon only
    Use this file for app icons, favicons, profile pictures, etc.
    Colors: teal #3AEAD6 → #0EA5E9 on dark navy #0D2035
  -->
  <defs>
    <linearGradient id="g" x1="21" y1="22" x2="79" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#3AEAD6"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0D2035"/>
      <stop offset="100%" stop-color="#071424"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="50" cy="60" rx="38" ry="26" fill="#2DD4BF" opacity="0.09"/>

  <!-- M mark (reads as 3-column structure) -->
  <path d="M 21 80 L 21 22 L 50 52 L 79 22 L 79 80"
        stroke="url(#g)" stroke-width="13"
        stroke-linecap="round" stroke-linejoin="round"
        fill="none" filter="url(#glow)"/>

  <!-- Route junction node -->
  <circle cx="50" cy="52" r="4.5" fill="url(#g)" opacity="0.65"/>
</svg>
