<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100">
  <!--
    MiraRoute Wordmark — Icon + Text
    Use for website headers, presentations, marketing materials.
    Width: 360px  Height: 100px
  -->
  <defs>
    <linearGradient id="mg" x1="21" y1="22" x2="79" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#3AEAD6"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3AEAD6"/>
      <stop offset="100%" stop-color="#A7F3D0"/>
    </linearGradient>
    <linearGradient id="ibg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0D2035"/>
      <stop offset="100%" stop-color="#071424"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Icon ── -->
  <rect x="0" y="0" width="100" height="100" rx="22" fill="url(#ibg)"/>
  <ellipse cx="50" cy="60" rx="38" ry="26" fill="#2DD4BF" opacity="0.09"/>
  <path d="M 21 80 L 21 22 L 50 52 L 79 22 L 79 80"
        stroke="url(#mg)" stroke-width="13"
        stroke-linecap="round" stroke-linejoin="round"
        fill="none" filter="url(#glow)"/>
  <circle cx="50" cy="52" r="4.5" fill="url(#mg)" opacity="0.65"/>

  <!-- ── Wordmark ── -->
  <!-- "Mira" — white -->
  <text x="116" y="62"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="36" font-weight="600" letter-spacing="-0.5"
        fill="white">Mira</text>
  <!-- "Route" — teal gradient via filled rect mask trick -->
  <text x="216" y="62"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="36" font-weight="300" letter-spacing="-0.5"
        fill="url(#tg)">Route</text>

  <!-- Tagline -->
  <text x="116" y="82"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="11" font-weight="400" letter-spacing="2"
        fill="#2DD4BF" opacity="0.7">USDC · EURC · ARC TESTNET</text>
</svg>
